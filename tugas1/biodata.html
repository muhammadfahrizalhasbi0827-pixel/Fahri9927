<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata | Modern Split Design</title>
    <style>
        /* Reset & Base Style */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #1a1a1a;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: flex-end;
            z-index: 100;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }

        nav a {
            margin-left: 30px;
            text-decoration: none;
            color: #1a1a1a;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ff4d4d;
        }

        /* Split Layout Container */
        .split-container {
            display: flex;
            min-height: 100vh;
            flex-wrap: wrap;
        }

        /* Sisi Kiri: Foto */
        .image-section {
            flex: 1;
            min-width: 400px;
            background: #f0f0f0;
            position: relative;
            overflow: hidden;
        }

        .image-section img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%);
        }

        /* Sisi Kanan: Informasi */
        .info-section {
            flex: 1;
            min-width: 400px;
            padding: 120px 80px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .info-section h1 {
            font-size: 4rem;
            line-height: 1;
            margin-bottom: 20px;
            color: #1a1a1a;
            border-left: 8px solid #ff4d4d;
            padding-left: 20px;
        }

        .info-section .role {
            font-size: 1.2rem;
            color: #ff4d4d;
            font-weight: 600;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Data List */
        .data-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        .data-item {
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .data-label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
        }

        .data-value {
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* Responsif untuk HP */
        @media (max-width: 768px) {
            .image-section {
                height: 40vh;
                min-width: 100%;
            }
            .info-section {
                padding: 40px 30px;
                min-width: 100%;
            }
            .info-section h1 {
                font-size: 2.5rem;
            }
            nav {
                padding: 15px;
                justify-content: center;
            }
            nav a {
                margin: 0 10px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">HOME</a>
        <a href="biodata.html">BIODATA</a>
        <a href="gallery.html">GALLERY</a>
        <a href="video.html">VIDEO</a>
    </nav>

    <div class="split-container">
        <div class="image-section">
            <img src="pp.jpeg" alt="My Portrait">
        </div>

        <div class="info-section">
            <p class="role">Biodata Saya</p>
            <h1>Nama <br> Muhammad Fikri Haikal</h1>
            
            <div class="data-grid">
                <div class="data-item">
                    <span class="data-label">Nomor Induk Mahasiswa</span>
                    <span class="data-value">2310715310006</span>
                </div>
                <div class="data-item">
                    <span class="data-label">Fakultas / Jurusan</span>
                    <span class="data-value">Perikanan dan Ilmu Kelautan / Sosial Ekonomi Perikanan</span>
                </div>
                <div class="data-item">
                    <span class="data-label">Tempat, Tanggal Lahir</span>
                    <span class="data-value">Batulicin, 22 September 2004</span>
                </div>
                <div class="data-item">
                    <span class="data-label">Kontak</span>
                    <span class="data-value">kalfikkz666@gmail.com | @fikrii.haikall</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
