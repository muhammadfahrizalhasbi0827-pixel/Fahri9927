<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Sajian Data</title>
    <!-- Menggunakan Chart.js untuk Grafik -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #4285F4;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-dark: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header Dashboard */
        .header {
            width: 100%;
            background-color: var(--card-bg);
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .container {
            width: 90%;
            max-width: 1200px;
        }

        /* Grid Layout untuk KPI */
        .kpi-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            border-bottom: 4px solid var(--primary-color);
        }

        .kpi-card h3 {
            margin: 0;
            font-size: 14px;
            color: #777;
            text-transform: uppercase;
        }

        .kpi-card p {
            margin: 10px 0 0;
            font-size: 24px;
            font-weight: bold;
            color: var(--text-dark);
        }

        /* Layout Grafik */
        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* Tombol Aksi */
        .action-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-bottom: 50px;
        }

        .button {
            padding: 12px 24px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .button:hover {
            background-color: #357ae8;
            box-shadow: 0 4px 12px rgba(66, 133, 244, 0.3);
        }

        .nav-back {
            text-decoration: none;
            color: #555;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .charts-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Dashboard Sajian Data</h1>
    <p>Ringkasan performa dan statistik terbaru</p>
</div>

<div class="container">
    <!-- KPI Section -->
    <div class="kpi-container">
        <div class="kpi-card">
            <h3>Total Pengunjung</h3>
            <p id="total-pengunjung">12,540</p>
        </div>
        <div class="kpi-card">
            <h3>Data Terproses</h3>
            <p id="total-data">845</p>
        </div>
        <div class="kpi-card">
            <h3>Efisiensi</h3>
            <p id="efisiensi">92%</p>
        </div>
        <div class="kpi-card">
            <h3>Kepuasan</h3>
            <p id="kepuasan">4.8/5</p>
        </div>
    </div>

    <!-- Charts Section -->
    <div class="charts-container">
        <div class="chart-card">
            <canvas id="barChart"></canvas>
        </div>
        <div class="chart-card">
            <canvas id="lineChart"></canvas>
        </div>
    </div>

    <!-- Actions Section -->
    <div class="action-area">
        <a href="../index2.html" class="nav-back">← Kembali ke Utama</a>
        <a class="button" href="https://datastudio.google.com/s/oaEfAvxaFTo" target="_blank">Buka Laporan Lengkap (Looker Studio)</a>
    </div>
</div>

<script>
    // Konfigurasi Grafik Batang (Bar Chart)
    const ctxBar = document.getElementById('barChart').getContext('2d');
    new Chart(ctxBar, {
        type: 'bar',
        data: {
            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun'],
            datasets: [{
                label: 'Data Masuk Bulanan',
                data: [65, 59, 80, 81, 56, 95],
                backgroundColor: 'rgba(66, 133, 244, 0.7)',
                borderColor: 'rgba(66, 133, 244, 1)',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                title: { display: true, text: 'Statistik Data Bulanan' }
            }
        }
    });

    // Konfigurasi Grafik Garis (Line Chart)
    const ctxLine = document.getElementById('lineChart').getContext('2d');
    new Chart(ctxLine, {
        type: 'line',
        data: {
            labels: ['Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu', 'Minggu'],
            datasets: [{
                label: 'Tren Aktivitas',
                data: [120, 190, 300, 250, 220, 450, 400],
                fill: true,
                backgroundColor: 'rgba(52, 168, 83, 0.2)',
                borderColor: 'rgba(52, 168, 83, 1)',
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            plugins: {
                title: { display: true, text: 'Tren Pengguna Mingguan' }
            }
        }
    });
</script>

</body>
</html>
