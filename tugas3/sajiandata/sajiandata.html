<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Sajian Data</title>
    <!-- Memasukkan library Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #4285F4;
            --bg: #f4f7f6;
            --white: #ffffff;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 { margin: 0; font-size: 24px; }

        /* Style Kartu Ringkasan */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }

        .card h3 { margin: 0; font-size: 14px; color: #777; }
        .card p { margin: 10px 0 0; font-size: 24px; font-weight: bold; color: var(--primary); }

        /* Style Area Grafik */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
        }

        .chart-container {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            min-height: 300px;
        }

        .btn-external {
            background-color: var(--primary);
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-external:hover { background-color: #357ae8; }

        .nav-back {
            margin-top: 30px;
            text-align: center;
        }

        .nav-back a {
            text-decoration: none;
            color: #555;
            padding: 8px 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        @media (max-width: 600px) {
            .charts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Dashboard Sajian Data</h1>
        <a class="btn-external" href="https://datastudio.google.com/s/oaEfAvxaFTo" target="_blank">Lihat Full Report ↗</a>
    </header>

    <!-- Kartu Statistik (KPI) -->
    <div class="stats-grid">
        <div class="card">
            <h3>Total Kunjungan</h3>
            <p>12,540</p>
        </div>
        <div class="card">
            <h3>Data Terinput</h3>
            <p>850</p>
        </div>
        <div class="card">
            <h3>Efisiensi</h3>
            <p>92%</p>
        </div>
        <div class="card">
            <h3>Target</h3>
            <p>1,000</p>
        </div>
    </div>

    <!-- Area Grafik -->
    <div class="charts-grid">
        <div class="chart-container">
            <canvas id="barChart"></canvas>
        </div>
        <div class="chart-container">
            <canvas id="pieChart"></canvas>
        </div>
    </div>

    <div class="nav-back">
        <a href="../index2.html">← Kembali ke Halaman Utama</a>
    </div>
</div>

<script>
    // Konfigurasi Grafik Batang (Bar Chart)
    const ctxBar = document.getElementById('barChart').getContext('2d');
    new Chart(ctxBar, {
        type: 'bar',
        data: {
            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun'],
            datasets: [{
                label: 'Performa Bulanan',
                data: [12, 19, 3, 5, 2, 3],
                backgroundColor: '#4285F4',
                borderRadius: 5
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                title: { display: true, text: 'Tren Data Bulanan' }
            }
        }
    });

    // Konfigurasi Grafik Lingkaran (Pie Chart)
    const ctxPie = document.getElementById('pieChart').getContext('2d');
    new Chart(ctxPie, {
        type: 'doughnut',
        data: {
            labels: ['Kategori A', 'Kategori B', 'Kategori C'],
            datasets: [{
                data: [40, 30, 30],
                backgroundColor: ['#4285F4', '#34A853', '#FBBC05']
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                title: { display: true, text: 'Distribusi Kategori' }
            }
        }
    });
</script>

</body>
</html>
