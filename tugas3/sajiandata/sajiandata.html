<title>Sajian Data - Dashboard Publik</title>
<style>
  body {

    align-items: center;
    min-height: 100vh;
  }

  .header {
    margin: 20px 0;
    text-align: center;
  }

  /* Container untuk Dashboard */
  .dashboard-container {
    width: 90%;
    max-width: 1200px;
    height: 700px;
    background-color: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    overflow: hidden;
    margin-bottom: 20px;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  .nav-back {
    margin-bottom: 30px;
  }

  .nav-back a {
    text-decoration: none;
    color: #4285F4;
    font-weight: bold;
    padding: 10px 20px;
    border: 2px solid #4285F4;
    border-radius: 8px;
    transition: all 0.3s;
  }

  .nav-back a:hover {
    background-color: #4285F4;
    color: #fff;
  }
</style>
</head>
