<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendataan Keuangan</title>
    <style>
        /* =========================================
           CSS STYLING (Desain Antarmuka)
           ========================================= */
        :root {
            --primary: #0056b3;
            --secondary: #eef2f5;
            --text-dark: #333333;
            --border-color: #cccccc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--secondary);
            color: var(--text-dark);
            padding: 20px;
            line-height: 1.6;
        }

        .form-container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--primary);
        }

        fieldset {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            background-color: #fafbfc;
        }

        legend {
            font-weight: bold;
            color: #ffffff;
            background-color: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.95em;
        }

        .form-group { margin-bottom: 18px; }
        .form-row { display: flex; gap: 20px; }
        .form-row .form-group { flex: 1; }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.9em;
        }

        input[type="text"], input[type="number"], input[type="email"],
        input[type="tel"], input[type="date"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        }

        .button-group { display: flex; gap: 15px; }
        .button-group input[type="radio"] { display: none; }
        .button-group label {
            flex: 1; text-align: center; padding: 12px;
            border: 2px solid var(--primary); border-radius: 6px;
            cursor: pointer; transition: all 0.3s;
            color: var(--primary); font-weight: bold; margin: 0;
            background-color: #ffffff;
        }
        .button-group input[type="radio"]:checked + label {
            background-color: var(--primary); color: #ffffff;
        }

        .btn-submit {
            width: 100%; padding: 16px; background-color: var(--primary);
            color: #ffffff; border: none; border-radius: 8px;
            font-size: 1.1em; font-weight: bold; cursor: pointer;
            transition: 0.3s; margin-top: 10px;
        }
        .btn-submit:hover { background-color: #004494; }
        .btn-submit:disabled { background-color: #999999; cursor: not-allowed; }

        @media (max-width: 600px) { .form-row { flex-direction: column; gap: 0; } }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Formulir Pengumpulan Data</h2>
    
    <form id="dataForm" name="dataForm">
        
        <fieldset>
            <legend>Data Demografi</legend>
            <div class="form-group">
                <label>Nama Pengguna</label>
                <input type="text" name="nama" required placeholder="Masukkan nama lengkap sesuai identitas">
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Tanggal Lahir (Bulan/Hari/Tahun)</label>
                    <input type="date" name="tgl_lahir" required>
                </div>
                <div class="form-group">
                    <label>No. Telepon / WhatsApp</label>
                    <input type="tel" name="telepon" required placeholder="Contoh: 081234567890">
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="alamat.email@contoh.com">
            </div>

            <div class="form-group">
                <label>Alamat Lengkap</label>
                <textarea name="alamat" rows="3" required placeholder="Nama jalan, RT/RW, Desa, Kecamatan..."></textarea>
            </div>

            <div class="form-group">
                <label>Tingkat Pendidikan (Pilih atau Ketik)</label>
                <input list="pendidikan-opsi" name="pendidikan" required placeholder="Cari tingkat pendidikan...">
                <datalist id="pendidikan-opsi">
                    <option value="SD / Sederajat">
                    <option value="SMP / Sederajat">
                    <option value="SMA / SMK / Sederajat">
                    <option value="Diploma (D1 - D4)">
                    <option value="Sarjana (S1)">
                    <option value="Magister (S2)">
                    <option value="Doktor (S3)">
                </datalist>
            </div>
        </fieldset>

        <fieldset>
            <legend>Data Perbankan</legend>
            <div class="form-row">
                <div class="form-group">
                    <label>Nama Bank (Pilih atau Ketik)</label>
                    <input list="bank-opsi" name="nama_bank" required placeholder="Cari nama bank...">
                    <datalist id="bank-opsi">
                        <option value="Bank BCA">
                        <option value="Bank Mandiri">
                        <option value="Bank BNI">
                        <option value="Bank BRI">
                        <option value="Bank BSI (Syariah)">
                        <option value="Bank Kalsel">
                        <option value="Bank CIMB Niaga">
                    </datalist>
                </div>
                <div class="form-group">
                    <label>Nomor Rekening</label>
                    <input type="number" name="no_rekening" required placeholder="Hanya masukkan angka">
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Data Transaksi Keuangan</legend>
            <div class="form-group">
                <label>Tanggal Transaksi</label>
                <input type="date" name="tgl_transaksi" required>
            </div>
            
            <div class="form-group">
                <label>Uraian Transaksi</label>
                <input type="text" name="uraian" required placeholder="Contoh: Pembelian bibit/pakan, Biaya operasional, dll.">
            </div>

            <div class="form-group">
                <label>Jenis Transaksi</label>
                <div class="button-group">
                    <input type="radio" id="btn-debet" name="jenis_transaksi" value="Debet" required>
                    <label for="btn-debet">Debet (Pemasukan)</label>
                    
                    <input type="radio" id="btn-kredit" name="jenis_transaksi" value="Kredit">
                    <label for="btn-kredit">Kredit (Pengeluaran)</label>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Nominal Debet (Rp)</label>
                    <input type="number" name="nominal_debet" value="0" min="0">
                </div>
                <div class="form-group">
                    <label>Nominal Kredit (Rp)</label>
                    <input type="number" name="nominal_kredit" value="0" min="0">
                </div>
            </div>
        </fieldset>

        <button type="submit" id="btn-submit" class="btn-submit">Simpan Data ke Google Sheets</button>
    </form>
</div>

<script>
    // 1. PASTE URL WEB APP ANDA DI ANTARA TANDA KUTIP TUNGGAL DI BAWAH INI:
    const scriptURL = 'https://script.google.com/macros/s/AKfycbysU5Y3Mq17RUE1omNY-15OeOuIL_x4KSMycOj2hF3w-sQZjQqcxDUim3CMo8bwVfZC/exec';
    
    const form = document.getElementById('dataForm');
    const btnSubmit = document.getElementById('btn-submit');

    form.addEventListener('submit', e => {
        e.preventDefault(); // Mencegah halaman reload saat tombol ditekan
        
        // Peringatan jika URL belum diganti
        if(scriptURL === 'MASUKKAN_URL_WEB_APP_ANDA_DISINI') {
            alert("PERHATIAN: Anda belum memasukkan URL Google Apps Script!");
            return;
        }

        // Ubah tampilan tombol saat proses loading
        btnSubmit.disabled = true;
        btnSubmit.innerHTML = "Sedang Mengirim Data...";

        // Mengirim data ke Google Sheets
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert("SUKSES! Data berhasil disimpan ke Google Sheets.");
                form.reset(); // Mengosongkan form kembali
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = "Simpan Data ke Google Sheets";
            })
            .catch(error => {
                alert("GAGAL! Terjadi kesalahan saat mengirim data. Coba cek kembali pengaturan 'Anyone/Siapa saja' di Google Apps Script Anda.");
                console.error('Error!', error.message);
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = "Coba Kirim Lagi";
            });
    });
</script>

</body>
</html>
